<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashion Store</title>
    <link rel="stylesheet" href="../styles/principal.css">
    <link rel="stylesheet" href="../styles/media.css">
    <link href="https://fonts.googleapis.com/css2?family=Italiana&display=swap" rel="stylesheet">
</head>
<body>
    <header class="container">
        <div id="logo">
            <a href="index.html">Flashion Store</a>
        </div>
        <nav id="navegation">
            <ul class="nav-ul">
                <li class="nav-item"><a href="index.html">Início</a></li>
                <li class="nav-item"><a href="#">Produtos</a></li>
                <li class="nav-item"><a href="#">Contato</a></li>
                <li class="nav-item"><a href="#">Categoria</a></li>
                <li class="nav-item"><a href="#">Novidades</a></li>
                <li id="cart"><a href="#"><img src="../images/sacola.png" alt="Imagem de uma sacola"></a></li>
                <li id="theme"><a href="#"><img src="../images/coracao.png" alt="Imagem de um coração"></a></li>
            </ul>
        </nav>
    </header>

    <main id="inicio">
        <section class="content">
            <div class="content-products">
                <div class="title">
                    <h1>Sandálias em destaque</h1>
                    <p>Qualidade e conforto para todos os momentos!</p>
                </div>
                <div class="actions-filter">
                    <button id="filter">Mostrar filtros</button>
                    <span id="sales">Mais vendidos</span>
                </div>
            </div>
            <div class="cards">
                <div class="cards-products">
                    <div class="card-item">
                        <img src="../images/sandalia.jpeg" alt="Imagem de uma Sandalia">
                    </div>
                    <div class="card-item">
                        <img src="../images/sandalia2.jpeg" alt="magem de uma Sandalia">
                    </div>
                    <div class="card-item">
                        <img src="../images/sandalia3.jpeg" alt="magem de uma Sandalia">
                    </div>
                    <div class="card-item">
                        <img src="../images/sandalia4.jpeg" alt="magem de uma Sandalia">
                    </div>
                </div>
                <div class="cards-products">
                    <div class="card-item">
                        <img src="../images/sandalia5.jpeg" alt="magem de uma Sandalia">
                    </div>
                    <div class="card-item">
                        <img src="../images/sandalia6.jpeg" alt="magem de uma Sandalia">
                    </div>
                    <div class="card-item">
                        <img src="../images/sandalia7.jpeg" alt="magem de uma Sandalia">
                    </div>
                    <div class="card-item">
                        <img src="../images/sandalia8.jpeg" alt="magem de uma Sandalia">
                    </div>
                </div>
                <div class="cards-products">
                    <div class="card-item">
                        <img src="../images/sandalia9.jpeg" alt="magem de uma Sandalia">
                    </div>
                    <div class="card-item">
                        <img src="../images/sandalia10.jpeg" alt="magem de uma Sandalia">
                    </div>
                    <div class="card-item">
                        <img src="../images/sandalia11.jpeg" alt="magem de uma Sandalia">
                    </div>
                    <div class="card-item">
                        <img src="../images/sandalia12.jpeg" alt="magem de uma Sandalia">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="text/javascript" src="../scripts/script.js"></script>
</body>
</html>
